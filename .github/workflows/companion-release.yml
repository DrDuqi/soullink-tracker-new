name: Build SoulLink Companion

# Builds the standalone Windows installer for the Companion on a Windows runner
# (CI has the symbolic-link privilege that electron-builder's winCodeSign extraction
# needs — which a normal non-admin desktop shell lacks).
#
#   • Manual run (Actions tab → "Run workflow")  → builds + uploads the installer
#     as a downloadable artifact.
#   • Push a tag like `companion-v1.0.0`         → also publishes it as a GitHub
#     Release, which is what electron-updater reads for auto-updates.

on:
  workflow_dispatch:
  push:
    tags: ['companion-v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: companion-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build (and publish on tag) the installer
        run: npx electron-builder --win nsis --publish ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: SoulLink-Companion-Setup
          path: companion-app/dist/*.exe
          if-no-files-found: error
