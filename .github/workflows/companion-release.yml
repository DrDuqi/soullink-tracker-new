name: Build SoulLink Companion

# Builds the standalone Windows installer on a Windows runner (CI has the
# symbolic-link privilege electron-builder's winCodeSign extraction needs).
#
#   • Manual run (Actions tab → "Run workflow")  → builds + uploads the installer
#     as a downloadable artifact only (no release).
#   • Push a version tag like `v1.0.0`           → builds AND publishes a PUBLIC
#     GitHub Release with the installer attached. This is what the website's
#     download link (releases/latest/download/SoulLink-Companion-Setup.exe) and
#     the auto-updater read. The app version is taken from the tag automatically.

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: companion-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # The Companion now SERVES the built React app (same-origin), so it must be
      # bundled. Build it at the repo root first → dist/ is picked up by
      # electron-builder's extraResources (../dist → resources/web). The Supabase
      # values are the PUBLIC anon config (already shipped in the public web bundle).
      - name: Build website (bundled into the Companion)
        working-directory: ${{ github.workspace }}
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          npm ci
          npm run build

      - name: Install dependencies
        run: npm ci

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Build (and publish on tag) the installer
        run: npx electron-builder --win nsis --publish ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: SoulLink-Companion-Setup
          path: companion-app/dist/*.exe
          if-no-files-found: error
